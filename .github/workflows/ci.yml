name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
    
    - name: Install HTML Validator
      run: npm install -g html-validate
    
    - name: Validate HTML files
      run: |
        for file in html/*.html; do
          echo "Validating $file"
          html-validate $file || true
        done
    
    - name: Check CSS files
      run: |
        for file in css/*.css; do
          echo "Checking $file"
          if [ -s "$file" ]; then
            echo "✓ CSS file $file exists and is not empty"
          else
            echo "⚠️ Warning: CSS file $file is empty"
          fi
        done
    
    - name: Check JavaScript files
      run: |
        for file in js/*.js; do
          echo "Checking $file"
          if [ -s "$file" ]; then
            echo "✓ JavaScript file $file exists and is not empty"
          else
            echo "⚠️ Warning: JavaScript file $file is empty"
          fi
        done

  build:
    needs: test
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: Build Docker image
      run: docker build -t my-web-app .
    
    - name: Verify Docker image
      run: docker images | grep my-web-app
    
    - name: Test Docker container
      run: |
        docker run -d -p 8080:80 --name test-container my-web-app
        sleep 5
        curl -f http://localhost:8080/ || exit 1
        docker stop test-container
        docker rm test-container

  security-scan:
    needs: build
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Scan Docker image for vulnerabilities
      run: |
        docker build -t my-web-app .
        docker run --rm -v /var/run/docker.sock:/var/run/docker.sock aquasec/trivy image --severity HIGH,CRITICAL my-web-app
